<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarCheck | Registrati</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="navbar"></div>

    <main class="page-shell narrow">
        <section class="booking-card">
            <p class="eyebrow" id="authEyebrow">Nuovo account</p>
            <h1 id="authTitle">Registrati</h1>

            <div class="auth-role-switch" data-auth-switch>
                <button type="button" class="active" data-role="utente">Utente</button>
                <button type="button" data-role="officina">Officina</button>
            </div>

            <form class="stack-form auth-form" data-mode="registrazione" data-type="registrazione utente">
                <label class="user-field">Nome <input name="nome" type="text" required></label>
                <label class="mechanic-field hidden">Nome officina <input name="nomeOfficina" type="text"></label>
                <label class="mechanic-field hidden">Citta <input name="citta" type="text"></label>
                <label class="mechanic-field hidden">Indirizzo <input name="indirizzo" type="text" placeholder="Via Roma 10"></label>
                <fieldset class="mechanic-field mechanic-options hidden">
                    <legend>Specializzazioni</legend>
                    <p>Puoi selezionare una o più categorie principali.</p>
                    <label><input name="specializzazioni" type="checkbox" value="Meccanico"> Meccanico</label>
                    <label><input name="specializzazioni" type="checkbox" value="Elettrauto"> Elettrauto</label>
                    <label><input name="specializzazioni" type="checkbox" value="Gommista"> Gommista</label>
                </fieldset>
                <label class="mechanic-field hidden">Altri servizi <input name="servizi" type="text" placeholder="Tagliando, revisione, diagnosi elettronica"></label>
                <label>Email <input name="email" type="email" required></label>
                <label>Password <input name="password" type="password" required></label>
                <button type="submit">Crea account</button>
            </form>
            <p class="form-message"></p>
        </section>
    </main>

    <div id="footer"></div>
    <script src="../components/navbar.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
