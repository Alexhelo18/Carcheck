<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarCheck | Accedi</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="navbar"></div>

    <main class="page-shell narrow">
        <section class="booking-card">
            <p class="eyebrow" id="authEyebrow">Area utente</p>
            <h1 id="authTitle">Accedi</h1>

            <div class="auth-role-switch" data-auth-switch>
                <button type="button" class="active" data-role="utente">Utente</button>
                <button type="button" data-role="officina">Officina</button>
            </div>

            <form class="stack-form auth-form" data-mode="login" data-type="login utente">
                <label>Email <input name="email" type="email" required></label>
                <label>Password <input name="password" type="password" required></label>
                <button type="submit">Entra</button>
            </form>
            <p class="form-message"></p>
        </section>
    </main>

    <div id="footer"></div>
    <script src="../components/navbar.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
</body>

</html>
