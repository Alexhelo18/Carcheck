<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarCheck | Trova il meccanico giusto</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="navbar"></div>

    <main>
        <section class="hero">
            <div class="hero-content">
                <p class="eyebrow">Recensioni e prenotazioni per officine</p>
                <h1>Trova il miglior meccanico vicino a te</h1>
                <p>Confronta officine, leggi recensioni verificate e prenota online il servizio per la tua auto.</p>

                <form class="hero-search" id="homeSearchForm">
                    <input id="cityInput" type="text" placeholder="Inserisci la citta">
                    <input id="serviceInput" type="text" placeholder="Servizio, es. tagliando">
                    <button type="submit">Cerca</button>
                </form>
            </div>
        </section>

        <section class="popular-section">
            <div class="section-heading">
                <p class="eyebrow">Scelte dagli utenti</p>
                <h2>Officine più apprezzate</h2>
            </div>
            <div id="officine-container" class="officine-grid"></div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="../components/navbar.js"></script>
    <script src="../components/footer.js"></script>
    <script src="../components/cardOfficina.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
</body>

</html>
